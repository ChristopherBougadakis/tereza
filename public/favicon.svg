<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <rect width="64" height="64" rx="14" fill="#141414"/>
  <!-- Key icon (white) centered -->
  <g transform="translate(13, 13) scale(1.55)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Key ring -->
    <circle cx="7.5" cy="9" r="5"/>
    <!-- Key blade -->
    <line x1="12" y1="9" x2="22" y2="9"/>
    <line x1="20" y1="9" x2="20" y2="12"/>
    <line x1="17" y1="9" x2="17" y2="11"/>
  </g>
  <!-- Red accent dot -->
  <circle cx="49" cy="15" r="5" fill="#e53e3e"/>
</svg>
